<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="Inter, Arial, sans-serif">
  <defs>
    <pattern id="orzech5a" patternUnits="userSpaceOnUse" width="22" height="100">
      <rect width="22" height="100" fill="#6b4530"/>
      <path d="M0 0 L22 100 M0 50 L22 100 M11 0 L22 50" stroke="#3d2419" stroke-width="0.5" opacity="0.55"/>
      <rect x="0" y="20" width="22" height="1" fill="#7a4f37" opacity="0.4"/>
      <rect x="0" y="65" width="22" height="1" fill="#7a4f37" opacity="0.4"/>
    </pattern>
    <pattern id="orzech5b" patternUnits="userSpaceOnUse" width="100" height="22" patternTransform="rotate(0)">
      <rect width="100" height="22" fill="#6b4530"/>
      <path d="M0 0 L100 22 M50 0 L100 11" stroke="#3d2419" stroke-width="0.4" opacity="0.55"/>
    </pattern>
    <pattern id="floor5" patternUnits="userSpaceOnUse" width="80" height="20">
      <rect width="80" height="20" fill="#e8d2a8"/>
      <line x1="0" y1="10" x2="80" y2="10" stroke="#c2a371" stroke-width="0.6"/>
      <line x1="40" y1="0" x2="40" y2="20" stroke="#d4b58a" stroke-width="0.4"/>
    </pattern>
    <linearGradient id="shadowZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="warmGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4d0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff4d0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcb6a8"/>
      <stop offset="1" stop-color="#8e8678"/>
    </linearGradient>
    <linearGradient id="cloth2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#1d1d1d"/>
    </linearGradient>
  </defs>

  <text x="40" y="42" font-size="26" font-weight="700" fill="#111">Widok przez otwarte drzwi do garderoby</text>
  <text x="40" y="66" font-size="13" fill="#555">5 powierzchni orzecha Egger H3734 ST9 w jednej osi widokowej · spójność materiałowa sypialnia ↔ garderoba</text>

  <g transform="translate(120, 110)">
    <!-- TŁO SYPIALNI (off-white) z otworem drzwi -->
    <rect x="0" y="0" width="1360" height="850" fill="#f3f0e8"/>

    <!-- Ściana sypialni (front) z otworem drzwi -->
    <!-- lewa część ściany -->
    <rect x="0" y="0" width="320" height="850" fill="#f3f0e8" stroke="#111" stroke-width="2"/>
    <!-- prawa część ściany -->
    <rect x="1100" y="0" width="260" height="850" fill="#f3f0e8" stroke="#111" stroke-width="2"/>

    <!-- ODSUNIĘTE DRZWI WEJŚCIOWE — kawałek widoczny po lewej stronie otworu (kaseta) -->
    <g transform="translate(220, 60)">
      <rect width="100" height="630" fill="url(#orzech5a)" stroke="#222" stroke-width="2"/>
      <!-- uchwyt pełnowysokościowy czarny (od strony otworu, czyli po prawej) -->
      <rect x="86" y="20" width="12" height="590" fill="#000"/>
      <text x="50" y="320" font-size="11" fill="#fff" font-weight="700" text-anchor="middle">DRZWI</text>
      <text x="50" y="335" font-size="10" fill="#fff" text-anchor="middle">odsunięte</text>
      <text x="50" y="350" font-size="10" fill="#fff" text-anchor="middle">w kasecie</text>
      <text x="50" y="370" font-size="9" fill="#fff" text-anchor="middle" opacity="0.7">H3734</text>
    </g>

    <!-- OBRAMOWANIE OTWORU DO GARDEROBY -->
    <rect x="320" y="60" width="780" height="630" fill="none" stroke="#111" stroke-width="3"/>

    <!-- ZAGŁĘBIENIE w garderobę — perspektywa jednopunktowa -->
    <!-- sufit garderoby zbiegający do punktu -->
    <polygon points="320,60 1100,60 940,150 480,150" fill="#e8e4dd" stroke="#444" stroke-width="1"/>
    <!-- podłoga garderoby zbiegająca -->
    <polygon points="320,690 1100,690 940,600 480,600" fill="url(#floor5)" stroke="#111" stroke-width="1"/>

    <!-- LEWA ŚCIANA garderoby (ONA) — perspektywa -->
    <polygon points="320,60 480,150 480,600 320,690" fill="url(#orzech5a)" stroke="#222" stroke-width="2"/>
    <!-- półki ONA — pionowe podziały -->
    <g stroke="#3d2419" stroke-width="0.8" fill="none">
      <line x1="370" y1="180" x2="370" y2="615"/>
      <line x1="420" y1="170" x2="420" y2="635"/>
    </g>
    <!-- półki ONA — poziome podziały (A1/A2/A3) -->
    <g stroke="#3d2419" stroke-width="0.8" fill="none">
      <line x1="320" y1="250" x2="480" y2="240"/>
      <line x1="320" y1="420" x2="480" y2="395"/>
      <line x1="320" y1="540" x2="480" y2="510"/>
    </g>
    <!-- sukienki ONA w A1 -->
    <g transform="translate(340, 260)">
      <rect width="14" height="140" fill="url(#cloth)" opacity="0.85"/>
      <rect x="18" width="14" height="135" fill="#d4ccbb" opacity="0.85"/>
      <rect x="36" width="14" height="138" fill="#a89880" opacity="0.85"/>
      <rect x="54" width="14" height="142" fill="url(#cloth)" opacity="0.75"/>
      <rect x="72" width="14" height="130" fill="#c4b8a3" opacity="0.85"/>
    </g>
    <!-- buty ONA w dolnej części A3 -->
    <g transform="translate(340, 555)">
      <rect width="40" height="15" fill="#5b3a26" opacity="0.7"/>
      <rect y="20" width="40" height="15" fill="#3d2419" opacity="0.7"/>
      <rect x="50" width="35" height="15" fill="#7a4f37" opacity="0.7"/>
      <rect x="50" y="20" width="35" height="15" fill="#5b3a26" opacity="0.7"/>
    </g>
    <!-- etykieta ONA -->
    <text x="400" y="700" font-size="10" fill="#555" font-weight="700" text-anchor="middle">ONA · A1-A3</text>
    <text x="400" y="713" font-size="9" fill="#777" text-anchor="middle">otwarte półki H3734</text>

    <!-- PRAWA ŚCIANA garderoby (ON) — perspektywa -->
    <polygon points="1100,60 940,150 940,600 1100,690" fill="url(#orzech5a)" stroke="#222" stroke-width="2"/>
    <!-- półki ON pionowe -->
    <g stroke="#3d2419" stroke-width="0.8" fill="none">
      <line x1="1000" y1="170" x2="1000" y2="635"/>
      <line x1="1050" y1="180" x2="1050" y2="615"/>
    </g>
    <!-- półki ON poziome -->
    <g stroke="#3d2419" stroke-width="0.8" fill="none">
      <line x1="940" y1="240" x2="1100" y2="250"/>
      <line x1="940" y1="395" x2="1100" y2="420"/>
      <line x1="940" y1="510" x2="1100" y2="540"/>
    </g>
    <!-- marynarki ON w B1 -->
    <g transform="translate(953, 260)">
      <rect width="16" height="130" fill="url(#cloth2)" opacity="0.85"/>
      <rect x="20" width="16" height="128" fill="#2a2a2a" opacity="0.85"/>
      <rect x="40" width="16" height="132" fill="#454545" opacity="0.85"/>
      <rect x="60" width="16" height="126" fill="#1d1d1d" opacity="0.85"/>
      <rect x="80" width="16" height="129" fill="url(#cloth2)" opacity="0.75"/>
      <rect x="100" width="16" height="131" fill="#3a3a3a" opacity="0.85"/>
      <rect x="120" width="16" height="128" fill="#2d2d2d" opacity="0.85"/>
    </g>
    <!-- buty ON w dolnej części B3 -->
    <g transform="translate(953, 555)">
      <rect width="40" height="15" fill="#2a2018" opacity="0.7"/>
      <rect y="20" width="40" height="15" fill="#1a120c" opacity="0.7"/>
      <rect x="50" width="35" height="15" fill="#3d2419" opacity="0.7"/>
      <rect x="50" y="20" width="35" height="15" fill="#5b3826" opacity="0.7"/>
    </g>
    <!-- szuflady czarne (Legrabox graphite) B2 -->
    <g transform="translate(955, 430)">
      <rect width="90" height="22" fill="#2a2a2a" stroke="#000"/>
      <rect y="26" width="90" height="22" fill="#2a2a2a" stroke="#000"/>
      <rect y="52" width="90" height="22" fill="#2a2a2a" stroke="#000"/>
    </g>
    <text x="1020" y="700" font-size="10" fill="#555" font-weight="700" text-anchor="middle">ON · B1-B3</text>
    <text x="1020" y="713" font-size="9" fill="#777" text-anchor="middle">otwarte półki H3734</text>

    <!-- TYLNA ŚCIANA garderoby — drewniany HEADER + drzwi przesuwne -->
    <!-- header poziomy nad drzwiami -->
    <rect x="480" y="150" width="460" height="60" fill="url(#orzech5b)" stroke="#000" stroke-width="2"/>
    <text x="710" y="186" font-size="11" fill="#fff" font-weight="700" text-anchor="middle">HEADER orzech H3734 · 2360 × 400 × 18 mm</text>

    <!-- 2 panele przesuwne tylne C1/C2/C3 — front orzech, podzielony na 2 panele -->
    <rect x="480" y="210" width="230" height="390" fill="url(#orzech5a)" stroke="#000" stroke-width="2"/>
    <rect x="710" y="210" width="230" height="390" fill="url(#orzech5a)" stroke="#000" stroke-width="2"/>
    <!-- uchwyty pełnowysokościowe Sevroll Lounge -->
    <rect x="690" y="225" width="10" height="370" fill="#000"/>
    <rect x="720" y="225" width="10" height="370" fill="#000"/>
    <text x="595" y="380" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">PANEL PRZESUWNY</text>
    <text x="595" y="395" font-size="10" fill="#fff" text-anchor="middle">1180 × 2390 · H3734</text>
    <text x="595" y="410" font-size="10" fill="#fff" text-anchor="middle">Sevroll Slim 25</text>
    <text x="825" y="380" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">PANEL PRZESUWNY</text>
    <text x="825" y="395" font-size="10" fill="#fff" text-anchor="middle">(za nim moduły C1/C2/C3)</text>

    <!-- spoty sufitowe LED w garderobie 3000K -->
    <circle cx="600" cy="110" r="9" fill="#fff4d0" stroke="#aa9a55" stroke-width="1"/>
    <circle cx="710" cy="110" r="9" fill="#fff4d0" stroke="#aa9a55" stroke-width="1"/>
    <circle cx="820" cy="110" r="9" fill="#fff4d0" stroke="#aa9a55" stroke-width="1"/>
    <ellipse cx="600" cy="135" rx="50" ry="25" fill="url(#warmGlow)"/>
    <ellipse cx="710" cy="135" rx="50" ry="25" fill="url(#warmGlow)"/>
    <ellipse cx="820" cy="135" rx="50" ry="25" fill="url(#warmGlow)"/>

    <!-- cień strefy wewnątrz -->
    <polygon points="480,150 940,150 940,600 480,600" fill="url(#shadowZone)" pointer-events="none"/>

    <!-- PASEK LED 2700K pionowy przy drzwiach wejściowych -->
    <rect x="318" y="60" width="6" height="630" fill="#fff4d0"/>
    <text x="225" y="50" font-size="10" fill="#a47e00" font-weight="700">▓ pionowy pasek LED 2700K (od strony otworu)</text>

    <!-- PODŁOGA sypialni przed otworem -->
    <rect x="0" y="690" width="320" height="160" fill="url(#floor5)" stroke="#111" stroke-width="1"/>
    <rect x="0" y="690" width="320" height="6" fill="#111"/>
    <rect x="1100" y="690" width="260" height="160" fill="url(#floor5)" stroke="#111" stroke-width="1"/>
    <rect x="1100" y="690" width="260" height="6" fill="#111"/>
    <!-- linia ciągłości podłogi przez otwór (BEZ PROGU) -->
    <rect x="320" y="690" width="780" height="6" fill="#111"/>
    <text x="710" y="730" font-size="11" fill="#222" text-anchor="middle" font-weight="700">Barlinek dąb Almond — KONTYNUACJA bez progu (próg widoczny tylko linią cokołu)</text>

    <!-- cokół czarny mat 100 mm po obu stronach -->
    <rect x="0" y="685" width="320" height="9" fill="#111"/>
    <rect x="1100" y="685" width="260" height="9" fill="#111"/>
    <text x="160" y="780" font-size="10" fill="#444" text-anchor="middle">cokół czarny mat 100 mm</text>
    <text x="1230" y="780" font-size="10" fill="#444" text-anchor="middle">cokół czarny mat 100 mm</text>

    <!-- ETYKIETY 5 powierzchni orzecha -->
    <g font-size="11" font-weight="700">
      <circle cx="260" cy="380" r="14" fill="#c33" stroke="#fff" stroke-width="2"/>
      <text x="260" y="384" fill="#fff" text-anchor="middle">1</text>
      <text x="260" y="430" fill="#c33" text-anchor="middle" font-size="10">drzwi wejściowe</text>

      <circle cx="400" cy="320" r="14" fill="#c33" stroke="#fff" stroke-width="2"/>
      <text x="400" y="324" fill="#fff" text-anchor="middle">2</text>
      <text x="400" y="220" fill="#c33" text-anchor="middle" font-size="10">ONA — orzech</text>

      <circle cx="1020" cy="320" r="14" fill="#c33" stroke="#fff" stroke-width="2"/>
      <text x="1020" y="324" fill="#fff" text-anchor="middle">3</text>
      <text x="1020" y="220" fill="#c33" text-anchor="middle" font-size="10">ON — orzech</text>

      <circle cx="710" cy="180" r="14" fill="#c33" stroke="#fff" stroke-width="2"/>
      <text x="710" y="184" fill="#fff" text-anchor="middle">4</text>
      <text x="710" y="240" fill="#c33" text-anchor="middle" font-size="10">header poziomy</text>

      <circle cx="710" cy="500" r="14" fill="#c33" stroke="#fff" stroke-width="2"/>
      <text x="710" y="504" fill="#fff" text-anchor="middle">5</text>
      <text x="710" y="555" fill="#c33" text-anchor="middle" font-size="10">panele przesuwne C</text>
    </g>

    <!-- linia ZAKRESU otworu -->
    <line x1="320" y1="50" x2="1100" y2="50" stroke="#111" stroke-width="1"/>
    <line x1="320" y1="45" x2="320" y2="55" stroke="#111" stroke-width="1"/>
    <line x1="1100" y1="45" x2="1100" y2="55" stroke="#111" stroke-width="1"/>
    <text x="710" y="40" font-size="11" font-weight="700" fill="#111" text-anchor="middle">otwór 900 mm (drzwi odsunięte)</text>
  </g>

  <!-- LEGENDA -->
  <g transform="translate(40, 990)">
    <text font-size="13" font-weight="700" fill="#111">5 powierzchni orzecha H3734 w jednej osi widoku (czerwone numery):</text>
    <text x="0" y="22" font-size="11" fill="#333">① drzwi wejściowe odsunięte w kasecie · ② lewa kolumna ONA (otwarte półki) · ③ prawa kolumna ON · ④ drewniany header poziomy nad drzwiami tylnymi · ⑤ 2 panele przesuwne tylne (C1/C2/C3)</text>
    <text x="0" y="42" font-size="11" fill="#333">Jeden dekor · jedna partia produkcyjna z Korner Żary · podłoga Barlinek dąb Almond bez progu · cokół czarny mat 100 mm · LED 2700K (sypialnia) + 3000K (garderoba, spójność ciepła)</text>
  </g>
</svg>
