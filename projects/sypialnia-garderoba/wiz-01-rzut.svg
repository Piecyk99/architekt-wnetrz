<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1300" font-family="Inter, Arial, sans-serif">
  <defs>
    <pattern id="wood" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#5b3826"/>
      <path d="M0 0 L14 14 M0 7 L7 14 M7 0 L14 7" stroke="#3d2419" stroke-width="0.6" opacity="0.55"/>
    </pattern>
    <pattern id="floor" patternUnits="userSpaceOnUse" width="30" height="120">
      <rect width="30" height="120" fill="#e8d8bf"/>
      <path d="M0 0 L30 0 M0 120 L30 120" stroke="#c6ad84" stroke-width="0.8"/>
      <path d="M15 0 L15 120" stroke="#d3bf99" stroke-width="0.4"/>
    </pattern>
    <pattern id="boucle" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#b8b4ab"/>
      <circle cx="3" cy="3" r="1" fill="#9a9690" opacity="0.6"/>
    </pattern>
    <pattern id="lamele" patternUnits="userSpaceOnUse" width="18" height="40">
      <rect width="18" height="40" fill="#5b3826"/>
      <rect x="6" width="6" height="40" fill="#3d2419"/>
    </pattern>
  </defs>

  <text x="40" y="44" font-size="26" font-weight="700" fill="#111">Rzut sypialni — widok z góry</text>
  <text x="40" y="68" font-size="13" fill="#555">2360 × 2520 mm · h 2500 mm · skala 1:25 · układ liniowy z garderobą (w sąsiednim rzucie)</text>

  <g transform="translate(140, 110)">
    <!-- floor 2360 × 2520 mm → 944 × 1008 px (skala 0.4 px/mm) -->
    <rect x="0" y="0" width="944" height="1008" fill="url(#floor)" stroke="#222" stroke-width="6"/>

    <!-- ŚCIANA OKIENNA (top, krótka 2360 mm) -->
    <rect x="0" y="0" width="944" height="20" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <!-- okno 1200×1400 mm centralnie nad wezgłowiem łóżka (łóżko po lewej): środek wezgłowia = 320 px → okno 480 px szer od 80 px -->
    <rect x="80" y="-2" width="480" height="24" fill="#bfe1f3" stroke="#222" stroke-width="2"/>
    <line x1="80" y1="10" x2="560" y2="10" stroke="#fff" stroke-width="2"/>
    <text x="320" y="-8" font-size="12" fill="#111" text-anchor="middle" font-weight="700">OKNO 120 × 140 cm · parapet 85 cm</text>
    <!-- pas lameli pod ścianą okienną (cała ściana) -->
    <rect x="0" y="20" width="944" height="22" fill="url(#lamele)"/>
    <text x="472" y="36" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">LAMELE FORNIR ORZECH H3734 — cała ściana 2360×2500</text>

    <!-- ŚCIANA TYLNA (bottom, krótka 2360 mm) — z TV + drzwi przesuwne do garderoby -->
    <rect x="0" y="988" width="944" height="20" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <!-- pas orzechowego panelu na całej ścianie -->
    <rect x="0" y="966" width="944" height="22" fill="url(#wood)"/>
    <text x="260" y="982" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">PANEL ORZECH H3734 — TV (po lewej)</text>
    <!-- drzwi przesuwne kasetowe 900 mm szer = 360 px, pozycja 520-880 od lewej -->
    <rect x="520" y="986" width="360" height="24" fill="#3d2419" stroke="#222" stroke-width="2"/>
    <rect x="520" y="1010" width="360" height="20" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="700" y="1050" font-size="12" fill="#111" text-anchor="middle" font-weight="700">→ drzwi przesuwne kasetowe 90×210 orzech</text>
    <text x="700" y="1066" font-size="11" fill="#444" text-anchor="middle">soft-close, uchwyt pionowy Sevroll 1800</text>
    <!-- pasek LED przy drzwiach przesuwnych (pionowy) -->
    <rect x="510" y="966" width="6" height="22" fill="#ffe7a3" opacity="0.85"/>

    <!-- ŚCIANA LEWA (dłuższa 2520 mm) — bez lameli, sam tynk biały + łóżko bokiem -->
    <rect x="0" y="0" width="20" height="1008" fill="#fafafa" stroke="#222" stroke-width="2"/>

    <!-- ŚCIANA PRAWA (dłuższa 2520 mm) — drzwi z korytarza + lustro -->
    <rect x="924" y="0" width="20" height="1008" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <!-- drzwi z korytarza 80×210 mm = 320 px szer (w skali), pozycja 600-920 px od top (= 1500-2300 mm) -->
    <rect x="922" y="600" width="24" height="320" fill="#e8d8bf" stroke="#222" stroke-width="2"/>
    <text x="990" y="765" font-size="12" fill="#111" font-weight="700">drzwi sypialni</text>
    <text x="990" y="781" font-size="11" fill="#444">80×210 orzech H3734</text>
    <text x="990" y="797" font-size="11" fill="#444">ukryta futryna</text>
    <text x="990" y="813" font-size="11" fill="#444">zawias dolny, otwierane</text>
    <text x="990" y="829" font-size="11" fill="#444">w stronę okna →</text>
    <!-- łuk otwarcia drzwi (zawias przy dolnej krawędzi = 920 px od top, otwarte w stronę okna = w górę i w lewo) -->
    <path d="M 924 920 A 320 320 0 0 0 604 600" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- lustro pionowe 60×140 cm między nocną a drzwiami, na prawej ścianie, pozycja 280-520 px od top -->
    <rect x="930" y="280" width="14" height="240" fill="#cfd5dc" stroke="#000" stroke-width="2"/>
    <text x="990" y="395" font-size="11" fill="#111" font-weight="700">LUSTRO 60×140</text>
    <text x="990" y="411" font-size="10" fill="#444">+ LED 2700K za lustrem</text>

    <!-- ŁÓŻKO 160×200 cm = 640 × 800 px, dosunięte head w lewy-górny róg (przy ścianie okiennej i lewej) -->
    <g transform="translate(20, 20)">
      <!-- wezgłowie boucle (pod ścianą okienną) -->
      <rect x="0" y="0" width="640" height="40" fill="url(#boucle)" stroke="#444" stroke-width="1"/>
      <text x="320" y="26" font-size="11" fill="#222" text-anchor="middle" font-weight="700">WEZGŁOWIE BOUCLE SZARY · 160×110 cm</text>
      <!-- materac -->
      <rect x="20" y="40" width="600" height="760" fill="#fffdf6" stroke="#222" stroke-width="2"/>
      <text x="320" y="320" font-size="28" fill="#111" text-anchor="middle" font-weight="800">ŁÓŻKO</text>
      <text x="320" y="356" font-size="18" fill="#111" text-anchor="middle">160 × 200 cm</text>
      <text x="320" y="380" font-size="11" fill="#777" text-anchor="middle">dosunięte do lewej ściany — bez nocnej z lewej strony</text>
      <text x="320" y="396" font-size="11" fill="#777" text-anchor="middle">rama tapicerowana boucle, h 25 cm</text>
      <!-- poduszki -->
      <rect x="40" y="50" width="270" height="80" fill="#f0ebe0" stroke="#999" rx="6"/>
      <rect x="330" y="50" width="270" height="80" fill="#f0ebe0" stroke="#999" rx="6"/>
      <!-- kinkiet K1 (na lamelach nad wezgłowiem, lewa) -->
      <circle cx="160" cy="-10" r="6" fill="#111"/>
      <text x="160" y="-16" font-size="10" fill="#111" text-anchor="middle" font-weight="700">K1</text>
      <!-- kinkiet K2 (po prawej, ale uwaga: prawa nocna jest poza wezgłowiem) -->
      <circle cx="480" cy="-10" r="6" fill="#111"/>
      <text x="480" y="-16" font-size="10" fill="#111" text-anchor="middle" font-weight="700">K2</text>
    </g>

    <!-- NOCNA PRAWA (jedna, po prawej stronie łóżka) -->
    <g transform="translate(660, 60)">
      <rect x="0" y="0" width="180" height="160" fill="url(#wood)" stroke="#222" stroke-width="1.5"/>
      <text x="90" y="90" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">NOCNA P</text>
      <text x="90" y="106" font-size="10" fill="#fff" text-anchor="middle">45×40 cm</text>
      <text x="90" y="122" font-size="9" fill="#ddd" text-anchor="middle">orzech H3734</text>
    </g>

    <!-- STREFA TV/PRZEJŚCIE — między foot of bed (820 px) a ścianą tylną (988 px) — wąsko! 168 px = 420 mm -->
    <g transform="translate(60, 850)">
      <rect width="600" height="100" fill="none" stroke="#c46b1f" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
      <text x="300" y="50" font-size="10" fill="#c46b1f" text-anchor="middle" font-weight="700">strefa przed TV / przejście do garderoby (głębokość 420 mm)</text>
      <text x="300" y="66" font-size="9" fill="#888" text-anchor="middle">wąsko — wystarczy dla 1 osoby; bez ławki/skrzyni na końcu łóżka</text>
    </g>

    <!-- TV na ścianie tylnej (pokazany na rzucie jako prostokąt z numerem) -->
    <g transform="translate(160, 950)">
      <rect x="0" y="0" width="180" height="20" fill="#111" stroke="#000" stroke-width="2"/>
      <text x="90" y="14" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">TV 55"</text>
    </g>

    <!-- LAMPA wisząca centralna -->
    <g transform="translate(472, 504)">
      <circle r="22" fill="none" stroke="#111" stroke-width="2"/>
      <circle r="14" fill="#111"/>
      <text y="42" font-size="11" fill="#111" text-anchor="middle" font-weight="700">LAMPA CENTRALNA</text>
      <text y="56" font-size="10" fill="#444" text-anchor="middle">Muuto Fluid Ø190 czarny mat</text>
      <text y="68" font-size="10" fill="#444" text-anchor="middle">spód 2150 mm od podłogi</text>
    </g>

    <!-- dywan -->
    <rect x="40" y="660" width="700" height="320" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
    <text x="60" y="952" font-size="11" fill="#666">dywan wełniany 160×230 cm</text>

    <!-- gzymsy LED 2700K przy krótkich ścianach (sufit) -->
    <rect x="0" y="42" width="944" height="3" fill="#ffe7a3" opacity="0.85"/>
    <rect x="0" y="963" width="944" height="3" fill="#ffe7a3" opacity="0.85"/>
    <text x="30" y="58" font-size="9" fill="#a47e00" font-weight="700">▓ gzyms LED 2700K (sufit, ściana okienna)</text>
    <text x="30" y="958" font-size="9" fill="#a47e00" font-weight="700">▓ gzyms LED 2700K (sufit, ściana garderoby)</text>

    <!-- WYMIARY -->
    <line x1="0" y1="-50" x2="944" y2="-50" stroke="#111" stroke-width="1"/>
    <line x1="0" y1="-58" x2="0" y2="-42" stroke="#111" stroke-width="1"/>
    <line x1="944" y1="-58" x2="944" y2="-42" stroke="#111" stroke-width="1"/>
    <text x="472" y="-58" font-size="13" font-weight="700" fill="#111" text-anchor="middle">2360 mm (szerokość = szerokość garderoby)</text>

    <line x1="-50" y1="0" x2="-50" y2="1008" stroke="#111" stroke-width="1"/>
    <line x1="-58" y1="0" x2="-42" y2="0" stroke="#111" stroke-width="1"/>
    <line x1="-58" y1="1008" x2="-42" y2="1008" stroke="#111" stroke-width="1"/>
    <text x="-65" y="504" font-size="13" font-weight="700" fill="#111" text-anchor="middle" transform="rotate(-90 -65 504)">2520 mm (głębokość sypialni)</text>

    <!-- wymiary szczegółowe pozycji łóżka i drzwi -->
    <text x="320" y="1100" font-size="10" fill="#555" text-anchor="middle">łóżko 1600 dosunięte do lewej · nocna P 450 mm · przejście prawe 310 mm</text>
    <text x="660" y="1118" font-size="10" fill="#555" text-anchor="middle">drzwi z korytarza w prawej ścianie · 1500 mm od okna · zawias dolny</text>
    <text x="660" y="1136" font-size="10" fill="#555" text-anchor="middle">drzwi przesuwne do garderoby: lewa krawędź 1300 mm od lewej ściany</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(40, 1230)">
    <text font-size="14" font-weight="700" fill="#111">Legenda:</text>
    <g transform="translate(0, 14)">
      <rect width="20" height="14" fill="url(#wood)"/><text x="28" y="11" font-size="11" fill="#222">orzech Egger H3734</text>
      <rect x="170" width="20" height="14" fill="url(#boucle)"/><text x="198" y="11" font-size="11" fill="#222">boucle szary jasny</text>
      <rect x="340" width="20" height="14" fill="url(#floor)"/><text x="368" y="11" font-size="11" fill="#222">deska dąb Barlinek Almond</text>
      <rect x="540" width="20" height="14" fill="url(#lamele)"/><text x="568" y="11" font-size="11" fill="#222">lamele orzech 95+5 fuga</text>
      <rect x="750" y="3" width="14" height="8" fill="#ffe7a3"/><text x="770" y="11" font-size="11" fill="#222">LED 2700K</text>
      <circle cx="870" cy="7" r="5" fill="#111"/><text x="880" y="11" font-size="11" fill="#222">kinkiet / lampa czarny mat</text>
    </g>
  </g>
</svg>
