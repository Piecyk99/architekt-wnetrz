<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1200" font-family="Inter, Arial, sans-serif">
  <defs>
    <pattern id="wood" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(0)">
      <rect width="14" height="14" fill="#5b3826"/>
      <path d="M0 0 L14 14 M0 7 L7 14 M7 0 L14 7" stroke="#3d2419" stroke-width="0.6" opacity="0.55"/>
    </pattern>
    <pattern id="floor" patternUnits="userSpaceOnUse" width="30" height="120">
      <rect width="30" height="120" fill="#e8d8bf"/>
      <path d="M0 0 L30 0 M0 120 L30 120" stroke="#c6ad84" stroke-width="0.8"/>
      <path d="M15 0 L15 120" stroke="#d3bf99" stroke-width="0.4"/>
    </pattern>
    <pattern id="boucle" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#b8b4ab"/>
      <circle cx="3" cy="3" r="1" fill="#9a9690" opacity="0.6"/>
    </pattern>
    <pattern id="lamele" patternUnits="userSpaceOnUse" width="18" height="40">
      <rect width="18" height="40" fill="#5b3826"/>
      <rect x="6" width="6" height="40" fill="#3d2419"/>
    </pattern>
  </defs>

  <!-- title -->
  <text x="40" y="44" font-size="26" font-weight="700" fill="#111">Rzut sypialni — widok z góry</text>
  <text x="40" y="68" font-size="13" fill="#555">3650 × 4000 mm · h 2500 mm · skala ~1:25</text>

  <!-- room outer wall -->
  <g transform="translate(140, 110)">
    <!-- floor -->
    <rect x="0" y="0" width="1095" height="900" fill="url(#floor)" stroke="#222" stroke-width="6"/>

    <!-- north wall (okienna) with window -->
    <rect x="0" y="0" width="1095" height="20" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <!-- window opening -->
    <rect x="350" y="-2" width="450" height="24" fill="#bfe1f3" stroke="#222" stroke-width="2"/>
    <line x1="350" y1="10" x2="800" y2="10" stroke="#fff" stroke-width="2"/>
    <text x="575" y="-8" font-size="12" fill="#111" text-anchor="middle">OKNO 450 × 140 cm</text>

    <!-- lamele orzech royal panel na ścianie okiennej (po wewnętrznej stronie) -->
    <rect x="0" y="20" width="1095" height="30" fill="url(#lamele)"/>
    <text x="547" y="42" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">LAMELE MDF FORNIR ORZECH ROYAL — cała ściana 4000×2500</text>

    <!-- south wall (wejściowa) with door -->
    <rect x="0" y="880" width="1095" height="20" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <rect x="200" y="878" width="220" height="24" fill="#e8d8bf" stroke="#222" stroke-width="2"/>
    <text x="310" y="916" font-size="12" fill="#111" text-anchor="middle">drzwi sypialni 80×210 orzech</text>
    <!-- door swing arc -->
    <path d="M 420 880 A 220 220 0 0 1 200 660" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- east wall (długa, z garderobą) -->
    <rect x="1075" y="0" width="20" height="900" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <!-- drzwi przesuwne kasetowe -->
    <rect x="1073" y="280" width="24" height="240" fill="#5b3826" stroke="#222" stroke-width="2"/>
    <rect x="1093" y="280" width="20" height="240" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="1135" y="395" font-size="12" fill="#111" font-weight="700">GARDEROBA</text>
    <text x="1135" y="412" font-size="11" fill="#444">→ drzwi przesuwne</text>
    <text x="1135" y="426" font-size="11" fill="#444">   kasetowe 90×210</text>
    <text x="1135" y="440" font-size="11" fill="#444">   orzech Royal</text>
    <text x="1135" y="454" font-size="11" fill="#444">   uchwyt pion. 800</text>
    <!-- pasek LED przy drzwiach -->
    <rect x="1078" y="280" width="6" height="240" fill="#ffe7a3" opacity="0.85"/>
    <text x="1135" y="475" font-size="10" fill="#a47e00">▓ LED 2700K pionowy</text>

    <!-- west wall (długa, gładka) -->
    <rect x="0" y="0" width="20" height="900" fill="#fafafa" stroke="#222" stroke-width="2"/>

    <!-- ŁÓŻKO 160x200 dosunięte do ściany okiennej (czyli na górze) -->
    <g transform="translate(310, 30)">
      <!-- wezgłowie tapicerowane -->
      <rect x="-50" y="0" width="500" height="55" fill="url(#boucle)" stroke="#444" stroke-width="1"/>
      <text x="200" y="35" font-size="11" fill="#222" text-anchor="middle" font-weight="700">WEZGŁOWIE BOUCLE SZARY · 200×110 cm</text>
      <!-- nocne -->
      <rect x="-50" y="-5" width="50" height="50" fill="url(#wood)" stroke="#222" stroke-width="1.5"/>
      <text x="-25" y="22" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">NOC L</text>
      <text x="-25" y="34" font-size="8" fill="#fff" text-anchor="middle">45×40</text>
      <rect x="400" y="-5" width="50" height="50" fill="url(#wood)" stroke="#222" stroke-width="1.5"/>
      <text x="425" y="22" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">NOC P</text>
      <text x="425" y="34" font-size="8" fill="#fff" text-anchor="middle">45×40</text>
      <!-- materac -->
      <rect x="20" y="55" width="360" height="450" fill="#fffdf6" stroke="#222" stroke-width="2"/>
      <text x="200" y="270" font-size="22" fill="#111" text-anchor="middle" font-weight="800">ŁÓŻKO</text>
      <text x="200" y="296" font-size="16" fill="#111" text-anchor="middle">160 × 200 cm</text>
      <text x="200" y="318" font-size="11" fill="#777" text-anchor="middle">rama boucle, h 250 mm</text>
      <!-- poduszki -->
      <rect x="40" y="65" width="150" height="55" fill="#f0ebe0" stroke="#999" rx="6"/>
      <rect x="210" y="65" width="150" height="55" fill="#f0ebe0" stroke="#999" rx="6"/>
      <!-- kinkiety K1, K2 -->
      <circle cx="-25" cy="-15" r="6" fill="#111"/>
      <text x="-25" y="-22" font-size="10" fill="#111" text-anchor="middle" font-weight="700">K1</text>
      <circle cx="425" cy="-15" r="6" fill="#111"/>
      <text x="425" y="-22" font-size="10" fill="#111" text-anchor="middle" font-weight="700">K2</text>
    </g>

    <!-- ławka tapicerowana na końcu łóżka (opcja) -->
    <g transform="translate(370, 580)">
      <rect x="0" y="0" width="300" height="55" fill="#cfc8b9" stroke="#666" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="150" y="32" font-size="11" fill="#333" text-anchor="middle">ławka tapicerowana 300×55 (opcja)</text>
    </g>

    <!-- dywan -->
    <rect x="200" y="320" width="620" height="500" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
    <text x="220" y="800" font-size="11" fill="#666">dywan wełniany 200×290 cm</text>

    <!-- LAMPA wisząca centralna -->
    <g transform="translate(540, 700)">
      <circle r="22" fill="none" stroke="#111" stroke-width="2"/>
      <circle r="14" fill="#111"/>
      <text y="42" font-size="11" fill="#111" text-anchor="middle" font-weight="700">LAMPA CENTRALNA</text>
      <text y="56" font-size="10" fill="#444" text-anchor="middle">Muuto Fluid Ø190 czarny mat</text>
      <text y="68" font-size="10" fill="#444" text-anchor="middle">spód 2150 mm od podłogi</text>
    </g>

    <!-- LUSTRO na ścianie wejściowej (od wewnątrz patrząc na ścianę z drzwiami) -->
    <g transform="translate(550, 870)">
      <rect x="-100" y="0" width="200" height="14" fill="#cfd5dc" stroke="#000" stroke-width="2"/>
      <text x="0" y="-2" font-size="10" fill="#111" text-anchor="middle" font-weight="700">LUSTRO 60×180 + LED za lustrem</text>
    </g>

    <!-- KINKIET ściana wejściowa -->
    <g transform="translate(720, 880)">
      <circle r="7" fill="#111"/>
      <text x="0" y="-12" font-size="10" fill="#111" text-anchor="middle" font-weight="700">KINKIET dek.</text>
    </g>

    <!-- gzymsy LED 2700K po krótszych ścianach -->
    <rect x="0" y="50" width="1095" height="3" fill="#ffe7a3" opacity="0.85"/>
    <rect x="0" y="847" width="1095" height="3" fill="#ffe7a3" opacity="0.85"/>
    <text x="20" y="65" font-size="9" fill="#a47e00" font-weight="700">▓ gzyms LED 2700K (sufit)</text>
    <text x="20" y="862" font-size="9" fill="#a47e00" font-weight="700">▓ gzyms LED 2700K (sufit)</text>

    <!-- WYMIARY -->
    <!-- horizontal -->
    <line x1="0" y1="-50" x2="1095" y2="-50" stroke="#111" stroke-width="1"/>
    <line x1="0" y1="-58" x2="0" y2="-42" stroke="#111" stroke-width="1"/>
    <line x1="1095" y1="-58" x2="1095" y2="-42" stroke="#111" stroke-width="1"/>
    <text x="547" y="-58" font-size="13" font-weight="700" fill="#111" text-anchor="middle">3650 mm</text>
    <!-- vertical -->
    <line x1="-50" y1="0" x2="-50" y2="900" stroke="#111" stroke-width="1"/>
    <line x1="-58" y1="0" x2="-42" y2="0" stroke="#111" stroke-width="1"/>
    <line x1="-58" y1="900" x2="-42" y2="900" stroke="#111" stroke-width="1"/>
    <text x="-65" y="450" font-size="13" font-weight="700" fill="#111" text-anchor="middle" transform="rotate(-90 -65 450)">4000 mm</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(40, 1050)">
    <text font-size="14" font-weight="700" fill="#111">Legenda:</text>
    <g transform="translate(0, 14)">
      <rect width="20" height="14" fill="url(#wood)"/><text x="28" y="11" font-size="11" fill="#222">orzech Royal mat</text>
      <rect x="160" width="20" height="14" fill="url(#boucle)"/><text x="188" y="11" font-size="11" fill="#222">boucle szary jasny</text>
      <rect x="330" width="20" height="14" fill="url(#floor)"/><text x="358" y="11" font-size="11" fill="#222">deska dąb naturalny</text>
      <rect x="500" width="20" height="14" fill="url(#lamele)"/><text x="528" y="11" font-size="11" fill="#222">lamele orzech 40×20</text>
      <rect x="690" y="3" width="14" height="8" fill="#ffe7a3"/><text x="710" y="11" font-size="11" fill="#222">LED 2700K</text>
      <circle cx="810" cy="7" r="5" fill="#111"/><text x="820" y="11" font-size="11" fill="#222">kinkiet czarny mat</text>
    </g>
  </g>
</svg>
