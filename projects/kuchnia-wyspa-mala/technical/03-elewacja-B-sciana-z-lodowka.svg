<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -60 260 320" width="1300" height="1600" font-family="Arial, sans-serif">
  <rect x="-40" y="-60" width="260" height="320" fill="#ffffff"/>

  <defs>
    <pattern id="hatchB" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#888" stroke-width="0.4"/>
    </pattern>
    <marker id="dArrB" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
    <marker id="dArrBR" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="95" y="-40" font-size="9" font-weight="bold" text-anchor="middle">ELEWACJA B — ŚCIANA PRAWA (SŁUPEK AGD) — W3</text>
  <text x="95" y="-30" font-size="4" text-anchor="middle" fill="#444">Słupek lodówka + piekarnik · Skala 1:25 · Długość ściany 191 cm · Wysokość 250 cm</text>

  <!-- Tło ściany 191 x 250 -->
  <rect x="0" y="0" width="191" height="250" fill="#f7f4ee" stroke="#000" stroke-width="0.5"/>
  <rect x="-2" y="250" width="195" height="6" fill="url(#hatchB)"/>
  <rect x="-2" y="-6" width="195" height="6" fill="url(#hatchB)"/>

  <!-- Cokół -->
  <rect x="0" y="240" width="191" height="10" fill="#222" stroke="#000" stroke-width="0.3"/>

  <!-- W1 - słupek lodówki: szerokość 60 cm, lokalizacja x=0..60 (od strony półwyspy, bliżej narożnika z dolnym), wysokość pełna od cokołu do sufitu (230 cm) -->
  <!-- Strefa W1 zawiera: lodówka 202 cm wysokości + szafka nadstawka 28 cm. Z dolnym cokołem (10) i ewentualnym ciemnym fragmentem = 250. -->
  <rect x="0" y="10" width="60" height="230" fill="#dadcdf" stroke="#666" stroke-width="0.4"/>
  <!-- Linia podziału: lodówka u dołu (od y=38 do y=240 - 202 cm wysokości), szafka nad (od y=10 do y=38) -->
  <line x1="0" y1="38" x2="60" y2="38" stroke="#666" stroke-width="0.4"/>
  <text x="30" y="24" font-size="3" text-anchor="middle" fill="#000" font-weight="bold">szafka 28</text>
  <text x="30" y="29" font-size="2.4" text-anchor="middle" fill="#444">(zapasy rzadkie)</text>

  <!-- Lodówka -->
  <rect x="3" y="40" width="54" height="198" fill="#fafbfc" stroke="#666" stroke-width="0.3"/>
  <!-- Linia drzwi (góra-dół) -->
  <line x1="3" y1="100" x2="57" y2="100" stroke="#666" stroke-width="0.3" stroke-dasharray="2,1"/>
  <text x="30" y="65" font-size="3.5" text-anchor="middle" fill="#000" font-weight="bold">LODÓWKA</text>
  <text x="30" y="71" font-size="2.6" text-anchor="middle" fill="#000">60 × 60 × 202</text>
  <text x="30" y="76" font-size="2.6" text-anchor="middle" fill="#444">(chłodziarko-</text>
  <text x="30" y="80" font-size="2.6" text-anchor="middle" fill="#444">zamrażarka)</text>
  <text x="30" y="130" font-size="2.6" text-anchor="middle" fill="#888" font-style="italic">chłodzenie</text>
  <text x="30" y="170" font-size="2.6" text-anchor="middle" fill="#888" font-style="italic">zamrażarka</text>
  <!-- Uchwyt boczny -->
  <rect x="52" y="55" width="3" height="20" fill="#222"/>
  <rect x="52" y="200" width="3" height="20" fill="#222"/>
  <!-- Etykieta W1 -->
  <text x="3" y="14" font-size="2.6" fill="#a00" font-weight="bold">W1</text>

  <!-- W2 - słupek piekarnik + mikrofala: x=60..120 -->
  <rect x="60" y="10" width="60" height="230" fill="#dadcdf" stroke="#666" stroke-width="0.4"/>
  <!-- Podział wewnętrzny W2 od dołu:
       szuflada cargo 60 cm wys. (y=180 do y=240) — wysoka szuflada wewnętrzna
       piekarnik 60 cm (y=120 do y=180)
       mikrofala 38 cm (y=82 do y=120)
       szafka 70 cm pod sufit (y=10 do y=82) -->
  <!-- Szuflada cargo -->
  <rect x="62" y="182" width="56" height="56" fill="#e8d9b5" stroke="#8b6e3f" stroke-width="0.4"/>
  <text x="90" y="208" font-size="3" text-anchor="middle" fill="#5a4a2a" font-weight="bold">CARGO 60</text>
  <text x="90" y="213" font-size="2.4" text-anchor="middle" fill="#5a4a2a">spiżarnia</text>
  <text x="90" y="217" font-size="2.4" text-anchor="middle" fill="#5a4a2a">na zapasy</text>
  <line x1="62" y1="210" x2="118" y2="210" stroke="#8b6e3f" stroke-width="0.15"/>

  <!-- Piekarnik -->
  <rect x="62" y="122" width="56" height="58" fill="#222" stroke="#000" stroke-width="0.4"/>
  <text x="90" y="138" font-size="3.5" text-anchor="middle" fill="#fff" font-weight="bold">PIEKARNIK 60</text>
  <text x="90" y="143" font-size="2.4" text-anchor="middle" fill="#ddd">(do zabudowy)</text>
  <!-- Okienko piekarnika -->
  <rect x="66" y="148" width="48" height="20" fill="#444" stroke="#888" stroke-width="0.3"/>
  <!-- Uchwyt -->
  <rect x="70" y="172" width="40" height="2" fill="#888"/>
  <text x="90" y="176" font-size="2" text-anchor="middle" fill="#fff">uchwyt</text>

  <!-- Mikrofala -->
  <rect x="62" y="84" width="56" height="36" fill="#333" stroke="#000" stroke-width="0.3"/>
  <text x="90" y="98" font-size="3" text-anchor="middle" fill="#fff" font-weight="bold">MIKROFALA</text>
  <text x="90" y="103" font-size="2.4" text-anchor="middle" fill="#ddd">38 cm</text>
  <text x="90" y="113" font-size="2.2" text-anchor="middle" fill="#aaa">(do zabudowy)</text>

  <!-- Szafka górna nad mikrofalówką -->
  <rect x="62" y="12" width="56" height="70" fill="#e8d9b5" stroke="#8b6e3f" stroke-width="0.4"/>
  <text x="90" y="42" font-size="3" text-anchor="middle" fill="#5a4a2a" font-weight="bold">szafka</text>
  <text x="90" y="47" font-size="2.4" text-anchor="middle" fill="#5a4a2a">do sufitu</text>
  <text x="90" y="52" font-size="2.4" text-anchor="middle" fill="#5a4a2a">~70 cm</text>
  <text x="60" y="14" font-size="2.6" fill="#a00" font-weight="bold">W2</text>

  <!-- Strefa W3+W4 obok słupków (od x=120 do x=191) = 71 cm szerokości -->
  <!-- W3 dolna 82 cm wys -->
  <rect x="120" y="158" width="71" height="82" fill="#e8d9b5" stroke="#8b6e3f" stroke-width="0.4"/>
  <text x="155.5" y="195" font-size="3" text-anchor="middle" fill="#5a4a2a" font-weight="bold">W3</text>
  <text x="155.5" y="201" font-size="2.6" text-anchor="middle" fill="#5a4a2a">3 szuflady</text>
  <text x="155.5" y="206" font-size="2.6" text-anchor="middle" fill="#5a4a2a">na drobny AGD</text>
  <text x="155.5" y="211" font-size="2.6" text-anchor="middle" fill="#5a4a2a">i bieliznę</text>
  <line x1="122" y1="173" x2="189" y2="173" stroke="#8b6e3f" stroke-width="0.2"/>
  <line x1="122" y1="195" x2="189" y2="195" stroke="#8b6e3f" stroke-width="0.2"/>
  <line x1="122" y1="217" x2="189" y2="217" stroke="#8b6e3f" stroke-width="0.2"/>

  <!-- Blat nad W3 -->
  <rect x="120" y="154" width="71" height="4" fill="#2a2a2a" stroke="#000" stroke-width="0.3"/>
  <text x="155.5" y="157.5" font-size="2.2" text-anchor="middle" fill="#fff">blat 4 cm — strefa małego AGD</text>

  <!-- Małe AGD na blacie -->
  <rect x="125" y="138" width="14" height="16" fill="#b06030" stroke="#000" stroke-width="0.2" rx="1"/>
  <text x="132" y="148" font-size="2" text-anchor="middle" fill="#fff">kawa</text>
  <rect x="145" y="140" width="16" height="14" fill="#888" stroke="#000" stroke-width="0.2" rx="1"/>
  <text x="153" y="148" font-size="2" text-anchor="middle" fill="#fff">czajnik</text>
  <rect x="167" y="142" width="18" height="12" fill="#ccc" stroke="#000" stroke-width="0.2" rx="1"/>
  <text x="176" y="149" font-size="1.8" text-anchor="middle">toster</text>

  <!-- W4 górna -->
  <rect x="120" y="20" width="71" height="125" fill="#e8d9b5" stroke="#8b6e3f" stroke-width="0.4"/>
  <line x1="120" y1="100" x2="191" y2="100" stroke="#8b6e3f" stroke-width="0.3"/>
  <line x1="155.5" y1="20" x2="155.5" y2="100" stroke="#8b6e3f" stroke-width="0.15"/>
  <text x="155.5" y="60" font-size="3" text-anchor="middle" fill="#5a4a2a" font-weight="bold">W4</text>
  <text x="155.5" y="66" font-size="2.6" text-anchor="middle" fill="#5a4a2a">naczynia, kubki</text>
  <text x="155.5" y="70" font-size="2.6" text-anchor="middle" fill="#5a4a2a">+ szkło</text>
  <text x="155.5" y="120" font-size="2.6" text-anchor="middle" fill="#5a4a2a">nadstawka 35</text>

  <!-- Listwa LED -->
  <rect x="120" y="146" width="71" height="2" fill="#fdd060" stroke="none"/>
  <text x="155.5" y="148" font-size="1.8" text-anchor="middle" fill="#a87">LED podszafkowy</text>

  <!-- Gniazdka nad blatem (strefa małego AGD) -->
  <rect x="125" y="148" width="6" height="3" fill="#fff" stroke="#000" stroke-width="0.2"/>
  <rect x="135" y="148" width="6" height="3" fill="#fff" stroke="#000" stroke-width="0.2"/>
  <rect x="145" y="148" width="6" height="3" fill="#fff" stroke="#000" stroke-width="0.2"/>
  <text x="138" y="153" font-size="1.8" text-anchor="middle">3× gniazdko 230V</text>

  <!-- Maskownica górna -->
  <rect x="0" y="3" width="191" height="7" fill="#444" stroke="#000" stroke-width="0.2"/>
  <text x="95" y="8" font-size="2" text-anchor="middle" fill="#fff">maskownica górna do sufitu</text>

  <!-- WYMIARY -->
  <g stroke="#000" fill="#000">
    <!-- Dolny wymiar -->
    <line x1="0" y1="270" x2="191" y2="270" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.3"/>
    <text x="95.5" y="277" font-size="4" text-anchor="middle">191 cm (ściana prawa)</text>

    <line x1="0" y1="263" x2="60" y2="263" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="30" y="266" font-size="2.8" text-anchor="middle">60 (W1)</text>
    <line x1="60" y1="263" x2="120" y2="263" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="90" y="266" font-size="2.8" text-anchor="middle">60 (W2)</text>
    <line x1="120" y1="263" x2="191" y2="263" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="155.5" y="266" font-size="2.8" text-anchor="middle">71 (W3/W4)</text>

    <!-- Pionowe wymiary lewej -->
    <line x1="-15" y1="240" x2="-15" y2="250" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="-20" y="247" font-size="2.6" text-anchor="middle">10</text>

    <line x1="-15" y1="40" x2="-15" y2="240" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="-23" y="143" font-size="3" text-anchor="middle" transform="rotate(-90 -23 143)">200 (lodówka)</text>

    <line x1="-15" y1="10" x2="-15" y2="40" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="-20" y="27" font-size="2.6" text-anchor="middle" transform="rotate(-90 -20 27)">28 szafka</text>

    <line x1="-15" y1="3" x2="-15" y2="10" marker-end="url(#dArrB)" stroke-width="0.2"/>
    <text x="-20" y="7" font-size="2.4" text-anchor="middle">7 maskownica</text>

    <!-- Wymiar prawy h całkowite -->
    <line x1="207" y1="0" x2="207" y2="250" marker-start="url(#dArrBR)" marker-end="url(#dArrB)" stroke-width="0.3"/>
    <text x="212" y="125" font-size="4" text-anchor="middle" transform="rotate(90 212 125)">h = 250 cm [do pomiaru]</text>
  </g>

  <!-- Notatki techniczne -->
  <g transform="translate(0, 290)">
    <text x="0" y="0" font-size="3" font-weight="bold" fill="#a00">UWAGI:</text>
    <text x="0" y="5" font-size="2.6">1. Lodówka 60×60×202 cm wolnostojąca w zabudowie. Odstęp 5 cm po bokach dla wentylacji.</text>
    <text x="0" y="9" font-size="2.6">2. Piekarnik na wysokości oczu (top na ~180 cm od podłogi) — ergonomiczne, nie trzeba się schylać.</text>
    <text x="0" y="13" font-size="2.6">3. Mikrofala nad piekarnikiem — opcja; alternatywa: szafka dodatkowa lub ekspres do kawy do zabudowy.</text>
    <text x="0" y="17" font-size="2.6">4. Szuflada cargo 60 cm pod piekarnikiem — wysoki schowek na zapasy (mąka, oleje, woda).</text>
    <text x="0" y="21" font-size="2.6">5. Gniazdko piekarnika za szufladą cargo — dostępne po jej wyjęciu (serwis).</text>
    <text x="0" y="25" font-size="2.6">6. Strefa W3/W4 obok słupka (71 cm) — wolny blat na małe AGD codzienne (kawa, czajnik, toster).</text>
  </g>
</svg>
