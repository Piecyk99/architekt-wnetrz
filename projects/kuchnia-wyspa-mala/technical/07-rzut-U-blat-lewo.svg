<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-95 -95 480 385" width="1500" height="1203" font-family="Arial, sans-serif">
  <rect x="-95" y="-95" width="480" height="385" fill="#ffffff"/>
  <defs>
    <pattern id="ven4" patternUnits="userSpaceOnUse" width="3" height="3"><rect width="3" height="3" fill="#d9f0e0"/><line x1="0" y1="0" x2="3" y2="3" stroke="#16a34a" stroke-width="0.5"/></pattern>
    <pattern id="ind4" patternUnits="userSpaceOnUse" width="2.5" height="2.5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="2.5" stroke="#444" stroke-width="0.3"/></pattern>
    <pattern id="up4" patternUnits="userSpaceOnUse" width="4" height="4"><rect width="4" height="4" fill="#f0e6d0"/><line x1="0" y1="2" x2="4" y2="2" stroke="#b8975a" stroke-width="0.3"/></pattern>
    <marker id="b4" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.4" markerHeight="3.4" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#000"/></marker>
    <marker id="b4r" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.4" markerHeight="3.4" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#000"/></marker>
  </defs>

  <text x="0" y="-75" font-size="8.5" font-weight="bold">KUCHNIA 9.02 — U: BLAT PO LEWEJ + LODÓWKA JEDYNY SŁUPEK PO PRAWEJ (W3+U2)</text>
  <text x="0" y="-66" font-size="4" fill="#444">Rekomendacja: lewa ściana = blat roboczy + szafki górne (nie słupek); prawa = tylko lodówka we wnęce, wejście od korytarza wolne · Skala 1:25</text>

  <!-- FLOOR + WALLS (bottom open) -->
  <path d="M 14,0 L 259,0 L 259,191 L 0,191 L 0,63 L 14,63 Z" fill="#fafaf8" stroke="none"/>
  <path d="M 0,191 L 0,63 L 14,63 L 14,0 L 259,0 L 259,191" fill="none" stroke="#000" stroke-width="3" stroke-linejoin="miter"/>
  <rect x="0" y="0" width="14" height="63" fill="url(#ven4)" stroke="#16a34a" stroke-width="0.8"/>
  <text x="7" y="34" font-size="2.2" fill="#15803d" font-weight="bold" text-anchor="middle" transform="rotate(-90 7 34)">went?</text>

  <!-- window + water -->
  <rect x="60" y="-12" width="85" height="12" fill="#dceaf5" stroke="#3b6fa8" stroke-width="0.7"/>
  <line x1="60" y1="-6" x2="145" y2="-6" stroke="#3b6fa8" stroke-width="0.3"/>
  <text x="102" y="-2" font-size="3" fill="#2563a8" text-anchor="middle" font-weight="bold">OKNO (na wprost) ~85</text>
  <g transform="translate(102,8)"><circle cx="-5" r="1.6" fill="none" stroke="#1e40af" stroke-width="0.5"/><circle r="2.6" fill="#1e40af"/><circle cx="5" r="1.6" fill="none" stroke="#dc2626" stroke-width="0.5"/></g>
  <text x="102" y="15" font-size="2.1" fill="#b91c1c" text-anchor="middle">woda+odpływ (ściana z oknem)</text>

  <!-- TOP base -->
  <rect x="14" y="0" width="45" height="60" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.4"/>
  <text x="36" y="32" font-size="2.4" text-anchor="middle" fill="#5a4a2a" font-weight="bold">D1 prep 45</text>
  <rect x="59" y="0" width="85" height="60" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.4"/>
  <rect x="72" y="6" width="58" height="46" fill="#c9d6df" stroke="#3b5a73" stroke-width="0.5" rx="2"/><circle cx="101" cy="29" r="3" fill="#3b5a73"/>
  <text x="101" y="46" font-size="2.5" text-anchor="middle" fill="#000" font-weight="bold">ZLEW pod oknem</text>
  <text x="101" y="57" font-size="2" text-anchor="middle" fill="#444">D2·85</text>
  <rect x="144" y="0" width="45" height="60" fill="#e6e8eb" stroke="#666" stroke-width="0.4"/>
  <text x="166.5" y="31" font-size="2.4" text-anchor="middle" fill="#000" font-weight="bold">ZMYWARKA 45</text>
  <rect x="189" y="0" width="60" height="60" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.4"/>
  <rect x="193" y="4" width="52" height="40" fill="url(#ind4)" stroke="#222" stroke-width="0.5"/>
  <circle cx="206" cy="16" r="5" fill="none" stroke="#222" stroke-width="0.4"/><circle cx="232" cy="16" r="5" fill="none" stroke="#222" stroke-width="0.4"/>
  <circle cx="206" cy="34" r="5" fill="none" stroke="#222" stroke-width="0.4"/><circle cx="232" cy="34" r="5" fill="none" stroke="#222" stroke-width="0.4"/>
  <text x="219" y="52" font-size="2.4" text-anchor="middle" fill="#000" font-weight="bold">INDUKCJA 60</text>
  <text x="219" y="57" font-size="2" text-anchor="middle" fill="#444">D4 (piekarnik pod spodem)</text>
  <rect x="249" y="0" width="10" height="60" fill="#efe7d6" stroke="#8b6e3f" stroke-width="0.3"/>

  <!-- LEFT = BLAT + UPPERS (zmiana!) -->
  <rect x="0" y="63" width="60" height="88" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.5"/>
  <!-- uppers indicated as inner band along the wall -->
  <rect x="0" y="63" width="14" height="88" fill="url(#up4)" stroke="#b8975a" stroke-width="0.3"/>
  <text x="34" y="100" font-size="2.8" text-anchor="middle" fill="#5a4a2a" font-weight="bold">BLAT ROBOCZY (lewa)</text>
  <text x="34" y="105" font-size="2.3" text-anchor="middle" fill="#5a4a2a">base + worktop ~88 cm</text>
  <text x="34" y="109.5" font-size="2.3" text-anchor="middle" fill="#5a4a2a">szuflady / szafki</text>
  <text x="34" y="116" font-size="2.2" text-anchor="middle" fill="#7a5e2c" font-style="italic">+ szafki GÓRNE nad blatem</text>
  <text x="34" y="120" font-size="2.2" text-anchor="middle" fill="#7a5e2c" font-style="italic">(pasek przy ścianie) — schowki</text>
  <line x1="0" y1="63" x2="60" y2="63" stroke="#8b6e3f" stroke-width="0.3"/>

  <!-- PENINSULA -->
  <rect x="0" y="151" width="110" height="40" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.5"/>
  <text x="55" y="168" font-size="2.7" text-anchor="middle" fill="#5a4a2a" font-weight="bold">PÓŁWYSPA 110 × 40</text>
  <text x="55" y="173" font-size="2.1" text-anchor="middle" fill="#5a4a2a">szuflady + bar (gdzie dziś stolik)</text>
  <line x1="0" y1="191" x2="110" y2="191" stroke="#8b6e3f" stroke-width="1.5"/>

  <!-- PILLAR + FRIDGE (jedyny słupek) -->
  <rect x="189" y="131" width="10" height="60" fill="url(#ven4)" stroke="#16a34a" stroke-width="0.7"/>
  <text x="184" y="118" font-size="2.3" fill="#15803d" font-weight="bold">SŁUP (wnęka, stały)</text>
  <rect x="199" y="131" width="60" height="60" fill="#e6e8eb" stroke="#666" stroke-width="0.6"/>
  <text x="229" y="152" font-size="2.8" text-anchor="middle" fill="#000" font-weight="bold">LODÓWKA</text>
  <text x="229" y="157" font-size="2.2" text-anchor="middle" fill="#444">60×60×202</text>
  <text x="229" y="161.5" font-size="2" text-anchor="middle" fill="#444">jedyny wysoki mebel</text>
  <circle cx="199" cy="131" r="2" fill="#dc2626"/>
  <line x1="199" y1="131" x2="199" y2="71" stroke="#dc2626" stroke-width="0.8"/>
  <path d="M 199,71 A 60,60 0 0 1 159,151" fill="none" stroke="#dc2626" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="150" y="98" font-size="2.3" fill="#dc2626" font-weight="bold">drzwi ~110°</text>
  <text x="150" y="102" font-size="2" fill="#dc2626">do core (nie w wejście)</text>

  <!-- CORRIDOR ENTRY -->
  <line x1="110" y1="191" x2="189" y2="191" stroke="#d97706" stroke-width="2.2" stroke-dasharray="7,3"/>
  <text x="150" y="199" font-size="2.7" text-anchor="middle" fill="#b45309" font-weight="bold">WEJŚCIE OD KORYTARZA — wolne (~79 cm)</text>

  <!-- CORE -->
  <rect x="60" y="60" width="139" height="91" fill="none" stroke="#3aa635" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="130" y="122" font-size="3.2" text-anchor="middle" fill="#2a7a26" font-weight="bold">CORE 139 × 91 cm</text>

  <!-- DIMS -->
  <g stroke="#000" fill="#000">
    <line x1="14" y1="-30" x2="259" y2="-30" marker-start="url(#b4r)" marker-end="url(#b4)" stroke-width="0.3"/>
    <text x="136" y="-32" font-size="4" text-anchor="middle">259</text>
    <line x1="289" y1="0" x2="289" y2="191" marker-start="url(#b4r)" marker-end="url(#b4)" stroke-width="0.3"/>
    <text x="294" y="96" font-size="4" text-anchor="middle" transform="rotate(90 294 96)">191</text>
    <line x1="-28" y1="63" x2="-28" y2="151" marker-start="url(#b4r)" marker-end="url(#b4)" stroke-width="0.2"/>
    <text x="-32" y="107" font-size="2.6" text-anchor="middle" transform="rotate(-90 -32 107)">88 (blat lewy)</text>
    <line x1="0" y1="210" x2="110" y2="210" marker-start="url(#b4r)" marker-end="url(#b4)" stroke-width="0.2"/>
    <text x="55" y="214" font-size="2.5" text-anchor="middle">110 (półwyspa)</text>
    <line x1="110" y1="210" x2="189" y2="210" marker-start="url(#b4r)" marker-end="url(#b4)" stroke-width="0.2"/>
    <text x="150" y="214" font-size="2.5" text-anchor="middle">79 (wejście)</text>
    <line x1="199" y1="210" x2="259" y2="210" marker-start="url(#b4r)" marker-end="url(#b4)" stroke-width="0.2"/>
    <text x="229" y="214" font-size="2.5" text-anchor="middle">60 (lodówka)</text>
  </g>

  <!-- INFO -->
  <g transform="translate(305, -5)">
    <rect x="0" y="0" width="76" height="165" fill="#fffbeb" stroke="#000" stroke-width="0.4"/>
    <text x="38" y="6" font-size="3.5" font-weight="bold" text-anchor="middle">SŁUPEK PRAWO?</text>
    <line x1="2" y1="8" x2="74" y2="8" stroke="#000" stroke-width="0.3"/>
    <text x="3" y="14" font-size="2.7" font-weight="bold" fill="#b45309">ODRADZAM słupek po prawej:</text>
    <text x="3" y="18.5" font-size="2.4">- po prawej jest WEJŚCIE od korytarza;</text>
    <text x="3" y="22" font-size="2.4">  ściana wysokich mebli przy drzwiach</text>
    <text x="3" y="25.5" font-size="2.4">  = „tunel", przytłacza wejście</text>
    <text x="3" y="29" font-size="2.4">- słupek prawy skraca blat górny</text>
    <text x="3" y="32.5" font-size="2.4">  (kolizja w narożniku góra-prawo)</text>
    <text x="3" y="36" font-size="2.4">- lodówka i tak jest tam wysoka — dość</text>

    <text x="3" y="43" font-size="2.7" font-weight="bold" fill="#15803d">REKOMENDACJA — lewa = BLAT:</text>
    <text x="3" y="47.5" font-size="2.4">+ lewa ściana: blat roboczy (base) +</text>
    <text x="3" y="51" font-size="2.4">  szafki GÓRNE do sufitu</text>
    <text x="3" y="54.5" font-size="2.4">+ zysk: powierzchnia robocza I schowki</text>
    <text x="3" y="58" font-size="2.4">+ lekki wygląd, wejście zostaje otwarte</text>
    <text x="3" y="61.5" font-size="2.4">+ piekarnik pod indukcją (góra)</text>
    <text x="3" y="65" font-size="2.4">+ prawo = tylko lodówka (jeden akcent)</text>

    <text x="3" y="72" font-size="2.7" font-weight="bold">Gdzie jest przechowywanie?</text>
    <text x="3" y="76.5" font-size="2.4">- szuflady: pod całym blatem (góra+lewa)</text>
    <text x="3" y="80" font-size="2.4">- szafki górne: góra + lewa (do sufitu)</text>
    <text x="3" y="83.5" font-size="2.4">- półwyspa: 3 szuflady</text>
    <text x="3" y="87" font-size="2.4">- cargo/spiżarnia: w D1 lub pod indukcją</text>
    <text x="3" y="90.5" font-size="2.4">→ pojemność blisko wariantu ze słupkiem,</text>
    <text x="3" y="94" font-size="2.4">  bez bryły wysokiej przy wejściu</text>

    <text x="3" y="101" font-size="2.7" font-weight="bold" fill="#444">JEŚLI jednak chcesz słupek:</text>
    <text x="3" y="105.5" font-size="2.4">- najlepiej po LEWEJ (wariant 06),</text>
    <text x="3" y="109" font-size="2.4">  nie po prawej przy wejściu</text>
    <text x="3" y="112.5" font-size="2.4">- wtedy lewa = spiżarnia, mniej blatu</text>

    <text x="3" y="120" font-size="2.6" font-weight="bold" fill="#a00">[do pomiaru]</text>
    <text x="3" y="124" font-size="2.3" fill="#b91c1c">- szer. wnęki słupa (lodówka 60+filler?)</text>
    <text x="3" y="127.5" font-size="2.3" fill="#b91c1c">- szer. wejścia od korytarza</text>
    <text x="3" y="131" font-size="2.3" fill="#b91c1c">- górny-lewy róg: czy jest uskok/went.</text>
    <text x="3" y="134.5" font-size="2.3" fill="#b91c1c">- bok zawiasu lodówki</text>

    <text x="3" y="142" font-size="2.6" font-weight="bold">Porównaj:</text>
    <text x="3" y="146" font-size="2.3">06 = słupek-spiżarnia po LEWEJ</text>
    <text x="3" y="149.5" font-size="2.3">07 = blat+górne po lewej (TEN, rekom.)</text>

    <text x="3" y="158" font-size="2.2" font-style="italic" fill="#666">W3+U2 · 2026-05-28 · poglądowy</text>
  </g>

  <g transform="translate(335, 185)"><circle r="9" fill="#fff" stroke="#000" stroke-width="0.4"/><path d="M 0,-6 L 3.5,4 L 0,1.5 L -3.5,4 Z" fill="#000"/><text x="0" y="14" font-size="3" text-anchor="middle">OKNO ↑</text></g>
</svg>
