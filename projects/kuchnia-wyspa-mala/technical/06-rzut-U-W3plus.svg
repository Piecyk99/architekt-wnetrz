<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-95 -95 480 385" width="1500" height="1203" font-family="Arial, sans-serif">
  <rect x="-95" y="-95" width="480" height="385" fill="#ffffff"/>
  <defs>
    <pattern id="ven3" patternUnits="userSpaceOnUse" width="3" height="3"><rect width="3" height="3" fill="#d9f0e0"/><line x1="0" y1="0" x2="3" y2="3" stroke="#16a34a" stroke-width="0.5"/></pattern>
    <pattern id="ind3" patternUnits="userSpaceOnUse" width="2.5" height="2.5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="2.5" stroke="#444" stroke-width="0.3"/></pattern>
    <marker id="a3" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.4" markerHeight="3.4" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#000"/></marker>
    <marker id="a3r" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.4" markerHeight="3.4" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#000"/></marker>
  </defs>

  <text x="0" y="-75" font-size="8.5" font-weight="bold">KUCHNIA 9.02 — UKŁAD U-KSZTAŁT (W3+U) — RZUT Z GÓRY</text>
  <text x="0" y="-66" font-size="4" fill="#444">Wykorzystana lewa ściana (lewy słupek) · zlew pod oknem · indukcja prawo od okna · lodówka dół-prawo · półwyspa = dolne ramię U · Skala 1:25</text>

  <!-- FLOOR -->
  <path d="M 14,0 L 259,0 L 259,191 L 0,191 L 0,63 L 14,63 Z" fill="#fafaf8" stroke="none"/>
  <!-- WALLS top/left/right; bottom open -->
  <path d="M 0,191 L 0,63 L 14,63 L 14,0 L 259,0 L 259,191" fill="none" stroke="#000" stroke-width="3" stroke-linejoin="miter"/>
  <!-- vent shaft -->
  <rect x="0" y="0" width="14" height="63" fill="url(#ven3)" stroke="#16a34a" stroke-width="0.8"/>
  <text x="7" y="34" font-size="2.4" fill="#15803d" font-weight="bold" text-anchor="middle" transform="rotate(-90 7 34)">WENT.</text>

  <!-- window + water -->
  <rect x="60" y="-12" width="85" height="12" fill="#dceaf5" stroke="#3b6fa8" stroke-width="0.7"/>
  <line x1="60" y1="-6" x2="145" y2="-6" stroke="#3b6fa8" stroke-width="0.3"/>
  <text x="102" y="-2" font-size="3" fill="#2563a8" text-anchor="middle" font-weight="bold">OKNO ~85</text>
  <g transform="translate(102,8)"><circle cx="-5" r="1.6" fill="none" stroke="#1e40af" stroke-width="0.5"/><circle r="2.6" fill="#1e40af"/><circle cx="5" r="1.6" fill="none" stroke="#dc2626" stroke-width="0.5"/></g>
  <text x="102" y="15" font-size="2.1" fill="#b91c1c" text-anchor="middle">woda+odpływ (na ścianie z oknem)</text>

  <!-- ===== TOP BASE (ramię górne U) ===== -->
  <rect x="14" y="0" width="45" height="60" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.4"/>
  <text x="36" y="33" font-size="2.5" text-anchor="middle" fill="#5a4a2a" font-weight="bold">D1</text>
  <text x="36" y="37" font-size="2" text-anchor="middle" fill="#5a4a2a">45 prep</text>

  <rect x="59" y="0" width="85" height="60" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.4"/>
  <rect x="72" y="6" width="58" height="46" fill="#c9d6df" stroke="#3b5a73" stroke-width="0.5" rx="2"/>
  <circle cx="101" cy="29" r="3" fill="#3b5a73"/>
  <text x="101" y="46" font-size="2.5" text-anchor="middle" fill="#000" font-weight="bold">ZLEW pod oknem</text>
  <text x="101" y="57" font-size="2" text-anchor="middle" fill="#444">D2·85</text>

  <rect x="144" y="0" width="45" height="60" fill="#e6e8eb" stroke="#666" stroke-width="0.4"/>
  <text x="166.5" y="31" font-size="2.4" text-anchor="middle" fill="#000" font-weight="bold">ZMYWARKA</text>
  <text x="166.5" y="35.5" font-size="2.4" text-anchor="middle" fill="#000">45 · D3</text>

  <rect x="189" y="0" width="60" height="60" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.4"/>
  <rect x="193" y="4" width="52" height="40" fill="url(#ind3)" stroke="#222" stroke-width="0.5"/>
  <circle cx="206" cy="16" r="5" fill="none" stroke="#222" stroke-width="0.4"/><circle cx="232" cy="16" r="5" fill="none" stroke="#222" stroke-width="0.4"/>
  <circle cx="206" cy="34" r="5" fill="none" stroke="#222" stroke-width="0.4"/><circle cx="232" cy="34" r="5" fill="none" stroke="#222" stroke-width="0.4"/>
  <text x="219" y="52" font-size="2.4" text-anchor="middle" fill="#000" font-weight="bold">INDUKCJA 60</text>
  <text x="219" y="57" font-size="2" text-anchor="middle" fill="#444">D4 (piekarnik pod spodem)</text>
  <rect x="249" y="0" width="10" height="60" fill="#efe7d6" stroke="#8b6e3f" stroke-width="0.3"/>

  <!-- ===== LEWE RAMIĘ U (NOWE) — słupek spiżarnia na lewej ścianie ===== -->
  <rect x="0" y="63" width="60" height="88" fill="#ead9bc" stroke="#8b6e3f" stroke-width="0.5"/>
  <text x="30" y="100" font-size="3" text-anchor="middle" fill="#5a4a2a" font-weight="bold">S2 — SŁUPEK</text>
  <text x="30" y="105" font-size="2.5" text-anchor="middle" fill="#5a4a2a">SPIŻARNIA / CARGO</text>
  <text x="30" y="109.5" font-size="2.5" text-anchor="middle" fill="#5a4a2a">do sufitu (60 głęb.)</text>
  <text x="30" y="116" font-size="2.2" text-anchor="middle" fill="#7a5e2c" font-style="italic">NOWE: wykorzystana</text>
  <text x="30" y="120" font-size="2.2" text-anchor="middle" fill="#7a5e2c" font-style="italic">pusta lewa ściana</text>
  <line x1="0" y1="63" x2="60" y2="63" stroke="#8b6e3f" stroke-width="0.3"/>

  <!-- ===== PÓŁWYSPA = dolne ramię U ===== -->
  <rect x="0" y="151" width="110" height="40" fill="#f4e9d8" stroke="#8b6e3f" stroke-width="0.5"/>
  <text x="55" y="167" font-size="2.7" text-anchor="middle" fill="#5a4a2a" font-weight="bold">PÓŁWYSPA 110 × 40</text>
  <text x="55" y="172" font-size="2.1" text-anchor="middle" fill="#5a4a2a">szuflady (kuchnia) + bar (przedpokój)</text>
  <text x="55" y="176.5" font-size="2.1" text-anchor="middle" fill="#5a4a2a">wolnostojąca — łączy się z S2</text>
  <line x1="0" y1="191" x2="110" y2="191" stroke="#8b6e3f" stroke-width="1.5"/>

  <!-- ===== LODÓWKA dół-prawo + ŁUK OTWARCIA DRZWI ===== -->
  <rect x="199" y="131" width="60" height="60" fill="#e6e8eb" stroke="#666" stroke-width="0.6"/>
  <text x="229" y="150" font-size="2.8" text-anchor="middle" fill="#000" font-weight="bold">LODÓWKA</text>
  <text x="229" y="155" font-size="2.2" text-anchor="middle" fill="#444">60×60×202</text>
  <text x="229" y="159.5" font-size="2.1" text-anchor="middle" fill="#444">(dół-prawo)</text>
  <!-- front faces NORTH (do core); hinge na LEWEJ krawędzi x=199 -->
  <circle cx="199" cy="131" r="2" fill="#dc2626"/>
  <text x="193" y="128" font-size="2.2" fill="#dc2626" font-weight="bold">zawias</text>
  <!-- drzwi otwarte (linia) + łuk 110° -->
  <line x1="199" y1="131" x2="199" y2="71" stroke="#dc2626" stroke-width="0.8"/>
  <path d="M 199,71 A 60,60 0 0 1 159,151" fill="none" stroke="#dc2626" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="150" y="100" font-size="2.4" fill="#dc2626" font-weight="bold">łuk drzwi</text>
  <text x="150" y="104" font-size="2.2" fill="#dc2626">~110° (ćwierć koła)</text>
  <text x="150" y="108" font-size="2" fill="#dc2626">w stronę core — wolne</text>

  <!-- ENTRY x110..199 -->
  <line x1="110" y1="191" x2="199" y2="191" stroke="#d97706" stroke-width="2.2" stroke-dasharray="7,3"/>
  <text x="154" y="199" font-size="2.8" text-anchor="middle" fill="#b45309" font-weight="bold">WEJŚCIE ~89 cm (otwarte na przedpokój)</text>

  <!-- CORE -->
  <rect x="60" y="60" width="139" height="91" fill="none" stroke="#3aa635" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="130" y="128" font-size="3.4" text-anchor="middle" fill="#2a7a26" font-weight="bold">CORE 139 × 91 cm</text>
  <text x="130" y="133" font-size="2.4" text-anchor="middle" fill="#2a7a26">przejścia ≥ 90 cm wokół</text>

  <!-- triangle -->
  <polygon points="101,30 219,30 229,131" fill="none" stroke="#d2691e" stroke-width="0.5" stroke-dasharray="3,2"/>
  <circle cx="101" cy="30" r="1.8" fill="#d2691e"/><circle cx="219" cy="30" r="1.8" fill="#d2691e"/><circle cx="229" cy="131" r="1.8" fill="#d2691e"/>

  <!-- DIMS -->
  <g stroke="#000" fill="#000">
    <line x1="14" y1="-30" x2="259" y2="-30" marker-start="url(#a3r)" marker-end="url(#a3)" stroke-width="0.3"/>
    <text x="136" y="-32" font-size="4" text-anchor="middle">259</text>
    <line x1="289" y1="0" x2="289" y2="191" marker-start="url(#a3r)" marker-end="url(#a3)" stroke-width="0.3"/>
    <text x="294" y="96" font-size="4" text-anchor="middle" transform="rotate(90 294 96)">191</text>
    <line x1="-28" y1="63" x2="-28" y2="151" marker-start="url(#a3r)" marker-end="url(#a3)" stroke-width="0.2"/>
    <text x="-32" y="107" font-size="2.8" text-anchor="middle" transform="rotate(-90 -32 107)">88 (słupek S2)</text>
    <line x1="0" y1="210" x2="110" y2="210" marker-start="url(#a3r)" marker-end="url(#a3)" stroke-width="0.2"/>
    <text x="55" y="214" font-size="2.6" text-anchor="middle">110 (półwyspa)</text>
    <line x1="110" y1="210" x2="199" y2="210" marker-start="url(#a3r)" marker-end="url(#a3)" stroke-width="0.2"/>
    <text x="154" y="214" font-size="2.6" text-anchor="middle">89 (wejście)</text>
    <line x1="199" y1="210" x2="259" y2="210" marker-start="url(#a3r)" marker-end="url(#a3)" stroke-width="0.2"/>
    <text x="229" y="214" font-size="2.6" text-anchor="middle">60 (lodówka)</text>
  </g>

  <!-- INFO BOX -->
  <g transform="translate(305, -5)">
    <rect x="0" y="0" width="76" height="180" fill="#fffbeb" stroke="#000" stroke-width="0.4"/>
    <text x="38" y="6" font-size="3.6" font-weight="bold" text-anchor="middle">U vs L (W3+)</text>
    <line x1="2" y1="8" x2="74" y2="8" stroke="#000" stroke-width="0.3"/>

    <text x="3" y="14" font-size="2.8" font-weight="bold" fill="#15803d">PLUSY U:</text>
    <text x="3" y="18.5" font-size="2.4">+ lewa ściana (88 cm) wykorzystana</text>
    <text x="3" y="22" font-size="2.4">  → słupek spiżarnia = duże zapasy</text>
    <text x="3" y="25.5" font-size="2.4">+ +1 pełna kolumna przechowywania</text>
    <text x="3" y="29" font-size="2.4">+ otwarty front U = wejście (naturalne)</text>
    <text x="3" y="32.5" font-size="2.4">+ blat narożny L (lewy) = strefa prep</text>

    <text x="3" y="39" font-size="2.8" font-weight="bold" fill="#b45309">MINUSY U:</text>
    <text x="3" y="43.5" font-size="2.4">- core 139×91 zamiast 235×91</text>
    <text x="3" y="47" font-size="2.4">- słupek 60 zwęża lewą stronę</text>
    <text x="3" y="50.5" font-size="2.4">- narożnik góra-lewa: szacht went.</text>
    <text x="3" y="54" font-size="2.4">  ogranicza blat (zostaje od x=14)</text>
    <text x="3" y="57.5" font-size="2.4">- 2 narożniki wewn. = drożej (Korner)</text>

    <text x="3" y="64" font-size="2.8" font-weight="bold" fill="#dc2626">LODÓWKA — drzwi</text>
    <text x="3" y="68.5" font-size="2.4">Drzwi obracają się ~110° na pionowym</text>
    <text x="3" y="72" font-size="2.4">zawiasie (NIE na skos). Front na PÓŁNOC</text>
    <text x="3" y="75.5" font-size="2.4">(do core). Zawias na LEWEJ krawędzi →</text>
    <text x="3" y="79" font-size="2.4">drzwi otwierają się w stronę wejścia,</text>
    <text x="3" y="82.5" font-size="2.4">gdzie jest wolne 89 cm. OK.</text>
    <text x="3" y="86.5" font-size="2.4" fill="#b91c1c">! Filler 3-5 cm od prawej ściany —</text>
    <text x="3" y="90" font-size="2.4" fill="#b91c1c">  by szuflady/kosze wysuwały się w 100%.</text>
    <text x="3" y="93.5" font-size="2.4" fill="#b91c1c">! Jeśli front na PRZEDPOKÓJ (skos do</text>
    <text x="3" y="97" font-size="2.4" fill="#b91c1c">  hallu) — dostęp z hallu, gorzej. Odradzam.</text>

    <text x="3" y="104" font-size="2.8" font-weight="bold">Werdykt:</text>
    <text x="3" y="108.5" font-size="2.4">U ma sens, JEŚLI priorytet = przechowywanie.</text>
    <text x="3" y="112" font-size="2.4">Słupek S2 to realny zysk (pusta ściana).</text>
    <text x="3" y="115.5" font-size="2.4">Core 139×91 dla 1-2 osób wystarcza.</text>
    <text x="3" y="119" font-size="2.4">Dla maks. luzu → zostaw L (W3+).</text>

    <text x="3" y="126" font-size="2.6" font-weight="bold" fill="#a00">[do pomiaru]</text>
    <text x="3" y="130" font-size="2.3" fill="#b91c1c">- głęb. szachtu went. (14/37) →</text>
    <text x="3" y="133.5" font-size="2.3" fill="#b91c1c">  wpływa na blat górny-lewy i słupek</text>
    <text x="3" y="137" font-size="2.3" fill="#b91c1c">- prześwit przedpokoju (bar + wejście)</text>
    <text x="3" y="140.5" font-size="2.3" fill="#b91c1c">- bok zawiasu lodówki (L czy P)</text>
    <text x="3" y="144" font-size="2.3" fill="#b91c1c">- czy słupek 60 czy 40 (luz vs zapas)</text>

    <text x="3" y="151" font-size="2.8" font-weight="bold">Obieg U (Twój):</text>
    <text x="3" y="155.5" font-size="2.4">półwyspa → S2 (lewa) → zlew/indukcja</text>
    <text x="3" y="159" font-size="2.4">(góra) → lodówka (prawa). Zamknięty U.</text>

    <text x="3" y="167" font-size="2.2" font-style="italic" fill="#666">W3+U · FAZA 0a · 2026-05-28</text>
    <text x="3" y="171" font-size="2" font-style="italic" fill="#666">rysunek poglądowy</text>
  </g>

  <g transform="translate(335, 200)">
    <circle r="9" fill="#fff" stroke="#000" stroke-width="0.4"/>
    <path d="M 0,-6 L 3.5,4 L 0,1.5 L -3.5,4 Z" fill="#000"/>
    <text x="0" y="14" font-size="3" text-anchor="middle">OKNO ↑</text>
  </g>
</svg>
