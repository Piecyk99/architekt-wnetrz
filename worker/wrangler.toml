name = "architekt-wnetrz"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# CORS — domeny które mogą wołać API. Po zdeployowaniu frontu dodaj jego URL.
[vars]
ALLOWED_ORIGINS = "https://claude.ai,http://localhost:3000,http://localhost:8787"
CLAUDE_MODEL = "claude-sonnet-4-6"
GEMINI_MODEL = "gemini-3.1-flash-image-preview"

# D1 — baza danych projektów. Stwórz raz:
#   wrangler d1 create architekt-wnetrz
# Wynik wklej do `database_id`.
[[d1_databases]]
binding = "DB"
database_name = "architekt-wnetrz"
database_id = "ff765d85-4762-4b0c-bba5-afff40443b46"
migrations_dir = "migrations"

# R2 — storage na zdjęcia pomieszczeń i wygenerowane rendery.
# Stwórz raz: wrangler r2 bucket create architekt-wnetrz-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "architekt-wnetrz-media"

# Migracje workerów (nie mylić z migracjami D1)
[[migrations]]
tag = "v2"
new_classes = []

# SEKRETY — ustawiasz przez wrangler secret put:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put SHARED_SECRET
